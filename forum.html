<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Katran Dergi - Forum</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
    nav a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    nav a svg {
        flex-shrink: 0;
    }
    :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --ink: #1e293b;
    --muted: #64748b;
    --accent: #dc2626;
    --radius: 16px;
    --maxwidth: 880px;
    --shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    --gradient: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
    }

    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }
    body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    }

    .site-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .site {
    width: 100%;
    max-width: var(--maxwidth);
    margin: 0 auto;
    flex: 1;
    }

    header {
    background: linear-gradient(135deg, #111 0%, #2d3748 100%);
    color: white;
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
    }

    header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient);
    }

    h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    }

    nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
    }
    nav a {
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
    }
    nav a:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    }

    /* Auth, Profile & Form Styles */
    .auth-box, .forum-form, .profile-box {
    background: var(--card);
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    border: 1px solid rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
    }
    .auth-box::before, .forum-form::before, .profile-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--gradient);
    }

    h2 {
    color: var(--accent);
    margin-bottom: 20px;
    font-size: 1.5rem;
    }

    .input-group {
    margin-bottom: 15px;
    }
    .input-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    font-size: 0.9rem;
    }

    input[type="email"], input[type="password"], input[type="text"], textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    transition: all 0.3s ease;
    }
    input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    }

    .btn {
    background: var(--gradient);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    }
    .btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    }
    .btn-link {
    background: none;
    color: var(--muted);
    text-decoration: underline;
    margin-left: 10px;
    cursor: pointer;
    border: none;
    }
    .btn-secondary {
    background: #e2e8f0;
    color: var(--ink);
    }
    .btn-danger {
    background: #ef4444;
    color: white;
    padding: 4px 10px;
    font-size: 0.8rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    }
    .btn-danger:hover {
    background: #dc2626;
    }

    /* Forum Post Cards */
    .post-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.3s ease;
    position: relative;
    }
    .post-card:hover {
    transform: translateY(-3px);
    }
    .post-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 10px;
    align-items: center;
    }
    .post-title {
    color: var(--accent);
    font-size: 1.3rem;
    margin-bottom: 10px;
    font-weight: 700;
    }

    /* Comments Section */
    .comments-section {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #e2e8f0;
    }
    .comment {
    background: #f1f5f9;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.95rem;
    position: relative;
    }
    .comment-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
    }

    .hidden {
    display: none !important;
    }
    footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 20px;
    border-top: 1px solid #e2e8f0;
    }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="site-wrapper">
<div class="site">
<header>
    <h1>Katran Dergi - Diyalog Forumu</h1>
    <nav>
        <a href="index.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <a href="yazilar.html">

            Yazılar
        </a>
        
        <a href="kolektif.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

        </a>
        
        <a href="hakkinda.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>

        </a>
        
        <a href="forum.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

        </a>

</header>

<main>
    <section id="authSection" class="auth-box">
        <h2 id="authTitle">Kolektif Diyaloğa Katıl</h2>
        <form id="authForm">
            <div class="input-group">
                <label>E-posta</label>
                <input type="email" id="authEmail" required>
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="authPassword" required>
            </div>
            <button type="submit" class="btn" id="authBtn">Giriş Yap</button>
            <button type="button" class="btn-link" id="toggleAuth">Hesap Oluştur</button>
        </form>
    </section>

    <section id="profileSection" class="profile-box hidden">
        <h2>Profil Ayarları</h2>
        <form id="profileForm">
            <div class="input-group">
                <label>Görünecek İsim (Ad Soyad veya Mahlas)</label>
                <input type="text" id="profileName" required placeholder="Fikirlerinizin yanında görünecek isim...">
            </div>
            <button type="submit" class="btn">Profili Güncelle</button>
            <button type="button" id="closeProfileBtn" class="btn btn-secondary" style="margin-left: 10px;">Kapat</button>
        </form>
    </section>

    <section id="forumFormSection" class="forum-form hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span id="welcomeText" style="font-weight: 600;"></span>
            <div>
                <button class="btn btn-secondary" id="openProfileBtn" style="padding: 6px 12px; font-size: 0.85rem; margin-right: 5px;">Profili Düzenle</button>
                <button class="btn" id="logoutBtn" style="padding: 6px 12px; font-size: 0.85rem;">Çıkış Yap</button>
            </div>
        </div>
        <h2>Yeni Bir Tartışma Başlat</h2>
        <form id="newPostForm">
            <div class="input-group">
                <label>Başlık</label>
                <input type="text" id="postTitle" required placeholder="Tartışma konusunun özeti...">
            </div>
            <div class="input-group">
                <label>İçerik / Fikriniz</label>
                <textarea id="postContent" rows="4" required placeholder="Dogmalardan uzak, yapıcı fikriniz..."></textarea>
            </div>
            <button type="submit" class="btn">Paylaş</button>
        </form>
    </section>

    <section id="postsContainer"></section>
</main>

<footer>
    &copy; Katran Dergi — Kırmızı karanfil ektik, katranın bağrına
</footer>
</div>
</div>

<script>
// --- SUPABASE BAĞLANTISI ---
const SUPABASE_URL = "https://amsidonkrwwzkcbzuoct.supabase.co"; 
const SUPABASE_ANON_KEY = "sb_publishable_Jv_jxq7c8ZFws0g8S_nklA_xOMPLxpL";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- ⚠️ DIKKAT: YÖNETICI AYARI ⚠️ ---
// Kendi admin e-postanı buraya küçük harflerle yaz. 
// Bu e-posta ile girildiğinde sitedeki HER ŞEYİ silme butonu aktif olur.
const ADMIN_EMAIL = "yaynuray756@gmail.com"; 

// --- DOM ELEMENTLERİ ---
const authSection = document.getElementById('authSection');
const forumFormSection = document.getElementById('forumFormSection');
const profileSection = document.getElementById('profileSection');
const authForm = document.getElementById('authForm');
const authTitle = document.getElementById('authTitle');
const authBtn = document.getElementById('authBtn');
const toggleAuth = document.getElementById('toggleAuth');
const welcomeText = document.getElementById('welcomeText');
const logoutBtn = document.getElementById('logoutBtn');
const newPostForm = document.getElementById('newPostForm');
const postsContainer = document.getElementById('postsContainer');
const profileForm = document.getElementById('profileForm');
const profileNameInput = document.getElementById('profileName');
const openProfileBtn = document.getElementById('openProfileBtn');
const closeProfileBtn = document.getElementById('closeProfileBtn');

let isSignUpMode = false;
let currentUser = null;

// --- SİBER MODERASYON BOTU ---
function moderasyonBotuKontrol(metin) {
    const temizMetin = metin.toLowerCase();
    const yasakliKelimeler = [
        "evlilik", "evlenmek", "evlenecek", "arıyorum", "talibim", "talip", 
        "yaşındayım bayan", "yaşındayım erkek", "dul", "ciddi ilişki", "koca arıyorum", 
        "karı arıyorum", "bayanım", "erkek arkadaş", "kız arkadaş", "tanışmak isteyen", 
        "whatsapp", "instagram adresim", "dmden"
    ];

    for (let kelime of yasakliKelimeler) {
        if (temizMetin.includes(kelime)) {
            return { uygunsuz: true, neden: `"${kelime}" gibi izdivaç/tanışma odaklı ifadeler forum kurallarına aykırıdır.` };
        }
    }

    const telefonRegex = /(0\s?[2345][0-9]{2}\s?[0-9]{3}\s?[0-9]{2}\s?[0-9]{2})|([5][0-9]{9})/g;
    if (telefonRegex.test(temizMetin.replace(/\s/g, ''))) {
        return { uygunsuz: true, neden: "Güvenliğiniz ve forum düzeni için telefon numarası paylaşılması kesinlikle yasaktır." };
    }
    return { uygunsuz: false };
}

function getUserDisplayName(user) {
    if (user && user.user_metadata && user.user_metadata.display_name) {
        return user.user_metadata.display_name;
    }
    return user ? user.email : "Anonim";
}

// --- 1. OTURUM DURUMU KONTROLÜ ---
supabaseClient.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    if (currentUser) {
        authSection.classList.add('hidden');
        forumFormSection.classList.remove('hidden');
        
        const nameToShow = getUserDisplayName(currentUser);
        welcomeText.innerText = `Merhaba, ${nameToShow}`;
        profileNameInput.value = currentUser.user_metadata?.display_name || "";
    } else {
        authSection.classList.remove('hidden');
        forumFormSection.classList.add('hidden');
        profileSection.classList.add('hidden');
    }
    loadPosts();
});

openProfileBtn.addEventListener('click', () => profileSection.classList.remove('hidden'));
closeProfileBtn.addEventListener('click', () => profileSection.classList.add('hidden'));

// --- 2. GİRİŞ / KAYIT İŞLEMLERİ ---
toggleAuth.addEventListener('click', () => {
    isSignUpMode = !isSignUpMode;
    authTitle.innerText = isSignUpMode ? "Yeni Hesap Oluştur": "Kolektif Diyaloğa Katıl";
    authBtn.innerText = isSignUpMode ? "Kayıt Ol": "Giriş Yap";
    toggleAuth.innerText = isSignUpMode ? "Zaten hesabım var": "Hesap Oluştur";
});

authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;

    try {
        if (isSignUpMode) {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("Kayıt hatası: " + error.message);
            else alert("Kayıt başarılı! Lütfen e-posta adresinize gönderilen doğrulama linkine tıklayın.");
        } else {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Giriş hatası: " + error.message);
        }
    } catch (err) {
        alert("Beklenmedik bir hata oluştu: " + err.message);
    }
});

logoutBtn.addEventListener('click', () => supabaseClient.auth.signOut());

// --- PROFİL GÜNCELLEME İŞLEMİ ---
profileForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newName = profileNameInput.value.trim();

    const botKontrol = moderasyonBotuKontrol(newName);
    if (botKontrol.uygunsuz) {
        alert(`Sistem Uyarısı: Belirlediğiniz isim uygun bulunmadı. \nNeden: ${botKontrol.neden}`);
        return;
    }

    try {
        const { data, error } = await supabaseClient.auth.updateUser({
            data: { display_name: newName }
        });

        if (error) {
            alert("Profil güncellenirken hata oluştu: " + error.message);
        } else {
            alert("Profil başarıyla güncellendi!");
            profileSection.classList.add('hidden');
            welcomeText.innerText = `Merhaba, ${newName}`;
            loadPosts(); 
        }
    } catch (err) {
        alert("Profil güncellenirken beklenmedik bir hata oluştu.");
    }
});

// --- 3. FORUM BAŞLIĞI OLUŞTURMA ---
newPostForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('postTitle').value;
    const content = document.getElementById('postContent').value;
    const displayName = getUserDisplayName(currentUser);

    const botKontrolBaslik = moderasyonBotuKontrol(title);
    const botKontrolIcerik = moderasyonBotuKontrol(content);

    if (botKontrolBaslik.uygunsuz) {
        alert(`Katran Bot Engeli: Başlık uygun bulunmadı!\nNeden: ${botKontrolBaslik.neden}`);
        return;
    }
    if (botKontrolIcerik.uygunsuz) {
        alert(`Katran Bot Engeli: Gönderi içeriği uygun bulunmadı!\nNeden: ${botKontrolIcerik.neden}`);
        return;
    }

    try {
        const { error } = await supabaseClient.from('forum_posts').insert([
            { title, content, user_email: displayName, user_id: currentUser.id }
        ]);

        if (error) alert("Paylaşım hatası: " + error.message);
        else {
            newPostForm.reset();
            loadPosts();
        }
    } catch (err) {
        alert("Paylaşım gönderilirken hata oluştu.");
    }
});

// --- 4. VERİLERİ ÇEKME VE LİSTELEME ---
async function loadPosts() {
    if (!postsContainer) return;
    postsContainer.innerHTML = "<p style='text-align:center;'>Tartışmalar yükleniyor...</p>";

    try {
        const { data: posts, error } = await supabaseClient
            .from('forum_posts')
            .select(`*, forum_comments(*)`)
            .order('created_at', { ascending: false });

        if (error) {
            postsContainer.innerHTML = "<p>Yükleme hatası oluştu: " + error.message + "</p>";
            return;
        }

        if (!posts || posts.length === 0) {
            postsContainer.innerHTML = "<p style='text-align:center; color:var(--muted);'>Henüz bir tartışma başlatılmamış. İlk adımı sen at!</p>";
            return;
        }

        const isAdmin = currentUser && currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

        postsContainer.innerHTML = "";
        posts.forEach(post => {
            const date = new Date(post.created_at).toLocaleDateString('tr-TR');

            // Gönderiyi paylaşan kişi mi yoksa admin mi kontrolü
            const isPostOwner = currentUser && currentUser.id === post.user_id;
            const showPostDeleteBtn = isPostOwner || isAdmin;

            let commentsHTML = "";
            if (post.forum_comments) {
                post.forum_comments.forEach(comment => {
                    const isCommentOwner = currentUser && currentUser.id === comment.user_id;
                    const showCommentDeleteBtn = isCommentOwner || isAdmin;

                    commentsHTML += `
                        <div class="comment">
                            <div class="comment-meta">
                                <span>${comment.user_email} • ${new Date(comment.created_at).toLocaleDateString('tr-TR')}</span>
                                ${showCommentDeleteBtn ? `<button onclick="deleteComment('${comment.id}')" class="btn-danger">Sil</button>` : ''}
                            </div>
                            <div style="margin-top:5px;">${comment.content}</div>
                        </div>
                    `;
                });
            }

            const commentFormHTML = currentUser ? `
                <form onsubmit="addComment(event, '${post.id}')" style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" placeholder="Fikrinizi ekleyin..." required style="padding:8px;">
                    <button type="submit" class="btn" style="padding:8px 16px; font-size:0.9rem;">Gönder</button>
                </form>
            `: `<p style="font-size:0.85rem; color:var(--muted); margin-top:10px;">Yorum yazmak için giriş yapmalısınız.</p>`;

            const postElement = document.createElement('article');
            postElement.className = 'post-card';
            postElement.innerHTML = `
                <div class="post-meta">
                    <span>Fikir Sahibi: ${post.user_email}</span>
                    <div>
                        <span style="margin-right:10px;">${date}</span>
                        ${showPostDeleteBtn ? `<button onclick="deletePost('${post.id}')" class="btn-danger">Başlığı Sil</button>` : ''}
                    </div>
                </div>
                <h3 class="post-title">${post.title}</h3>
                <p style="white-space: pre-wrap; margin-bottom:15px;">${post.content}</p>

                <div class="comments-section">
                    <h4 style="font-size:0.9rem; margin-bottom:10px; color:var(--ink)">Yorumlar (${post.forum_comments ? post.forum_comments.length : 0})</h4>
                    <div class="comments-list">${commentsHTML}</div>
                    ${commentFormHTML}
                </div>
            `;
            postsContainer.appendChild(postElement);
        });
    } catch (err) {
        postsContainer.innerHTML = "<p>Bağlantı hatası yaşandı.</p>";
    }
}

// --- 5. YORUM EKLEME FONKSİYONU ---
async function addComment(e, postId) {
    e.preventDefault();
    const input = e.target.querySelector('input');
    const content = input.value;
    const displayName = getUserDisplayName(currentUser);

    const botKontrolYorum = moderasyonBotuKontrol(content);
    if (botKontrolYorum.uygunsuz) {
        alert(`Katran Bot Engeli: Yorumunuz uygun bulunmadı!\nNeden: ${botKontrolYorum.neden}`);
        return;
    }

    try {
        const { error } = await supabaseClient.from('forum_comments').insert([
            { post_id: postId, content, user_email: displayName, user_id: currentUser.id }
        ]);

        if (error) alert("Yorum eklenemedi: " + error.message);
        else {
            loadPosts();
        }
    } catch (err) {
        alert("Yorum gönderilirken bir hata oluştu.");
    }
}

// --- 🗑️ 6. SİLME FONKSİYONLARI (YENİ!) ---

// Başlık/Gönderi Silme
async function deletePost(postId) {
    if(!confirm("Bu tartışma başlığını ve ona bağlı tüm yorumları tamamen silmek istediğinize emin misiniz?")) return;

    try {
        // Önce gönderiye bağlı yorumları temizleyelim (Veritabanı kısıtlaması hatası vermemesi için)
        await supabaseClient.from('forum_comments').delete().eq('post_id', postId);
        
        // Sonra ana başlığı silelim
        const { error } = await supabaseClient.from('forum_posts').delete().eq('id', postId);

        if (error) alert("Silme hatası: " + error.message);
        else loadPosts();
    } catch (err) {
        alert("İşlem yapılırken bir hata oluştu.");
    }
}

// Yorum Silme
async function deleteComment(commentId) {
    if(!confirm("Bu yorumu silmek istediğinize emin misiniz?")) return;

    try {
        const { error } = await supabaseClient.from('forum_comments').delete().eq('id', commentId);

        if (error) alert("Yorum silinemedi: " + error.message);
        else loadPosts();
    } catch (err) {
        alert("İşlem yapılırken bir hata oluştu.");
    }
}
